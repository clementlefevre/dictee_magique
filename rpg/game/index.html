// ═══════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════
const cam = { x: 0, y: 0 };

function clampCam() {
  cam.x = Math.round(Math.max(0, Math.min(cam.x, MAP_W * TS - VW)));
  cam.y = Math.round(Math.max(0, Math.min(cam.y, MAP_H * TS - VH)));
}

function snapCamera() {
  const cx = player.x + player.w / 2 - VW / 2;
  const cy = player.y + player.h / 2 - VH / 2;
  cam.x += (cx - cam.x) * 0.12;
  cam.y += (cy - cam.y) * 0.12;
  clampCam();
}

const keys = {};
window.addEventListener('keydown', e => { 
  // Don't capture keys when typing in challenge input
  if (player.interacting && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
    return; // Let the input handle the key
  }
  
  keys[e.key] = true;
  if (e.key === ' ' && !player.interacting) {
    checkInteraction();
  }
  e.preventDefault(); 
}, { passive: false });
window.addEventListener('keyup', e => {

    return;

});

// Mobile Touch Controls
function setupMobileTouchControls() {
  const dpadMap = {
    'dpad-up': 'ArrowUp',
    'dpad-down': 'ArrowDown',
    'dpad-left': 'ArrowLeft',
    'dpad-right': 'ArrowRight'
  };

  // D-pad touch handlers with better event handling
  Object.keys(dpadMap).forEach(id => {
    const btn = document.getElementById(id);
    const key = dpadMap[id];
    
    const startHandler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      keys[key] = true;
      console.log('Touch start:', key);
    };
    
    const endHandler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      keys[key] = false;
      console.log('Touch end:', key);
    };
    
    btn.addEventListener('touchstart', startHandler, { passive: false });
    btn.addEventListener('touchend', endHandler, { passive: false });
    btn.addEventListener('touchcancel', endHandler, { passive: false });
    
    // Also add mouse events for testing on desktop
    btn.addEventListener('mousedown', startHandler);
    btn.addEventListener('mouseup', endHandler);
    btn.addEventListener('mouseleave', endHandler);
  });

  // Action button touch handler
  const actionBtn = document.getElementById('actionBtn');
  const actionHandler = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (!player.interacting) {
      console.log('Touch action button');
      checkInteraction();
    }
  };
  actionBtn.addEventListener('touchstart', actionHandler, { passive: false });
  actionBtn.addEventListener('mousedown', actionHandler);

  // Canvas continuous touch controls
  const canvas = document.getElementById('c');
  let touchActive = false;
  let touchStartTime = 0;
  let lastTouchX = 0;
  let lastTouchY = 0;
  
  function clearTouchKeys() {
    keys['ArrowUp'] = false;
    keys['ArrowDown'] = false;
    keys['ArrowLeft'] = false;
    keys['ArrowRight'] = false;
  }
  
  function updateTouchMovement(clientX, clientY) {
    if (player.interacting) return;
    
    // Get canvas position
    const rect = canvas.getBoundingClientRect();
    const canvasCenterX = rect.left + rect.width / 2;
    const canvasCenterY = rect.top + rect.height / 2;
    
    // Calculate direction from canvas center to touch point
    const dx = clientX - canvasCenterX;
    const dy = clientY - canvasCenterY;
    
    // Minimum distance to register as movement
    const minDist = 30;
    if (Math.abs(dx) < minDist && Math.abs(dy) < minDist) {
      clearTouchKeys();
      return;
    }
    
    // Determine primary direction
    clearTouchKeys();
    if (Math.abs(dx) > Math.abs(dy)) {
      // Horizontal movement is stronger
      if (dx > 0) {
        keys['ArrowRight'] = true;
      } else {
        keys['ArrowLeft'] = true;
      }
    } else {
      // Vertical movement is stronger
      if (dy > 0) {
        keys['ArrowDown'] = true;
      } else {
        keys['ArrowUp'] = true;
      }
    }
  }
  
  canvas.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    touchActive = true;
    touchStartTime = Date.now();
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
    
    if (!player.interacting) {
      updateTouchMovement(touch.clientX, touch.clientY);
    }
  }, { passive: true });
  
  canvas.addEventListener('touchmove', (e) => {
    if (!touchActive) return;
    const touch = e.touches[0];
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
    
    if (!player.interacting) {
      updateTouchMovement(touch.clientX, touch.clientY);
    }
  }, { passive: true });
  
  canvas.addEventListener('touchend', (e) => {
    const touchDuration = Date.now() - touchStartTime;
    const touch = e.changedTouches[0];
    const dx = Math.abs(touch.clientX - lastTouchX);
    const dy = Math.abs(touch.clientY - lastTouchY);
    
    // Quick tap with minimal movement = interact
    if (touchDuration < 250 && dx < 15 && dy < 15 && !player.interacting) {
      checkInteraction();
    }
    
    touchActive = false;
    clearTouchKeys();
  }, { passive: true });
  
  canvas.addEventListener('touchcancel', (e) => {
    touchActive = false;
    clearTouchKeys();
  }, { passive: true });
}

setupMobileTouchControls();

// ═══════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════
function tileAt(wx, wy) {
  const tx = Math.floor(wx / TS);
  const ty = Math.floor(wy / TS);
  if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return T.WATER;
  return map[ty][tx];
}

function isBlocked(wx, wy) {
  const tx = Math.floor(wx / TS);
  const ty = Math.floor(wy / TS);
  if (objBlocked.has(`${tx},${ty}`)) return true;
  return SOLID.has(tileAt(wx, wy));
}

function canMoveTo(nx, ny) {
  const m = 3;
  return !isBlocked(nx + m, ny + m) &&
         !isBlocked(nx + player.w - m, ny + m) &&
         !isBlocked(nx + m, ny + player.h - m) &&
         !isBlocked(nx + player.w - m, ny + player.h - m);
}

// ═══════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════
function checkInteraction() {
  const playerCenterX = player.x + player.w / 2;
  const playerCenterY = player.y + player.h / 2;
  
  for (const station of STATIONS) {
    const dx = playerCenterX - (station.x + TS/2);
    const dy = playerCenterY - (station.y + TS/2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if (dist < TS * 1.5) {
      startChallenge(station);
      return;
    }
  }
}

function setupDicteeChallenge(station) {

    return;
  }
  
  // Get questions for this level
  const levelKey = `QUESTIONS_LEVEL_${station.dicteeLevel}`;
  const questions = DICTEE_DATA[levelKey];
  
  if (!questions) {
    console.error('❌ No questions for level:', levelKey);
    return;
  }
  
  const questionKeys = Object.keys(questions);
  const randomKey = questionKeys[Math.floor(Math.random() * questionKeys.length)];
  const correctWord = questions[randomKey];

  station.currentQuestion = {
    key: randomKey,
    word: correctWord,
    level: station.dicteeLevel
  };
  
  console.log('🎵 Playing:', randomKey, '=', correctWord);
  
  // Play audio
  const audioPath = `assets/sounds/${levelKey}/${randomKey}.mp3`;
  const sound = new Howl({
    src: [audioPath],

    },
    onloaderror: (id, err) => {

    }

function setupCalculChallenge(difficulty) {
  const high = difficulty > 1 ? 149 : 79;
  const op = Math.random() < 0.55 ? '+' : '-';
  const a = Math.floor(Math.random() * (high - 18 + 1)) + 18;
  const b = op === '+' 
    ? Math.floor(Math.random() * (high - 10 - 7 + 1)) + 7
    : Math.floor(Math.random() * (a - 3 + 1)) + 3;
  
  const answer = op === '+' ? a + b : a - b;
  gameState.currentChallenge.problem = { a, b, op, answer };
  
  console.log('🔢 Generated calcul problem:', a, op, b, '=', answer, '(difficulty:', difficulty, ')');
  
  // Determine how many digit columns are needed
  const cols = Math.max(String(a).length, String(b).length, String(answer).length);
  const aStr = String(a).padStart(cols, '0');
  const bStr = String(b).padStart(cols, '0');

  // Build digit cells; leading-zero positions are invisible placeholders
  function numCells(str) {
    return str.split('').map((ch, i) => {
      const leading = parseInt(str.slice(0, i + 1), 10) === 0;
      return leading
        ? `<div class="calcul-cell" style="visibility:hidden"></div>`
        : `<div class="calcul-cell">${ch}</div>`;
    }).join('');
  }

  const retenuCells = Array.from({ length: cols }, (_, i) =>
    `<input type="text" inputmode="numeric" class="calcul-retenu" id="retenu${i}" maxlength="1" placeholder="r">`
  ).join('');

  const answerCells = Array.from({ length: cols }, (_, i) =>
    `<input type="text" inputmode="numeric" class="calcul-input" id="calcul${i}" maxlength="1">`
  ).join('');

  const content = document.getElementById('challengeContent');
  content.innerHTML = `
    <div id="calculGrid" style="grid-template-columns: repeat(${cols + 1}, 60px);">
      <div class="calcul-retenu-label">&#x2191; retenues</div>
      <div></div>${retenuCells}
      <div></div>${numCells(aStr)}
      <div class="calcul-cell calcul-operator">${op}</div>${numCells(bStr)}
      <div class="calcul-line"></div>
      <div></div>${answerCells}
    </div>
  `;

  // Retenu cells: digit-only, no auto-advance (free navigation)
  for (let i = 0; i < cols; i++) {
    const r = document.getElementById(`retenu${i}`);
    r.addEventListener('input', () => {
      r.value = r.value.replace(/[^0-9]/g, '').slice(-1);
    });
  }

  // Answer cells: digit-only, auto-advance left→right, Enter submits
  for (let i = 0; i < cols; i++) {
    const inp = document.getElementById(`calcul${i}`);
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/[^0-9]/g, '').slice(-1);
      if (inp.value.length === 1 && i < cols - 1) document.getElementById(`calcul${i + 1}`).focus();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitChallenge();
    });
  }

  setTimeout(() => document.getElementById('calcul0').focus(), 100);
}

function submitChallenge() {
  const station = gameState.currentChallenge;
  const feedback = document.getElementById('feedback');
  let correct = false;
  
  console.log('✅ Submitting challenge type:', station.challengeType);
  
  if (station.challengeType === 'dictee') {
    const answer = document.getElementById('answerInput').value.trim();
    const correctWord = station.currentQuestion.word;
    
    // Normalize: lowercase + remove accents
    const normalize = (str) => {
      return str
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    };
    
    const normalizedAnswer = normalize(answer);
    const normalizedCorrect = normalize(correctWord);
    correct = normalizedAnswer === normalizedCorrect;
    
    console.log('📝 Answer:', answer, '| Correct:', correctWord, '| Match:', correct);
    
    if (!correct) {
      feedback.textContent = `${station.failure} Le mot était : "${correctWord}"`;
    }
  } else if (station.challengeType === 'calcul') {
    const digits = [];
    for (let i = 0; document.getElementById(`calcul${i}`); i++) {
      digits.push(document.getElementById(`calcul${i}`).value);
    }
    const userAnswer = parseInt(digits.join(''), 10);
    correct = !isNaN(userAnswer) && userAnswer === station.problem.answer;
    
    console.log('🔢 Answer:', userAnswer, '| Correct:', station.problem.answer, '| Match:', correct);
  }
  
  if (correct) {
    // Play success sound
    const successSounds = [
      'assets/sounds/ANSWERS_OK/ok_1.mp3',
      'assets/sounds/ANSWERS_OK/ok_2.mp3',
      'assets/sounds/ANSWERS_OK/ok_3.mp3',
      'assets/sounds/ANSWERS_OK/ok_4.mp3'
    ];
    const randomSuccess = successSounds[Math.floor(Math.random() * successSounds.length)];
    new Howl({ src: [randomSuccess], volume: 0.8 }).play();
    
    feedback.textContent = station.success;
    feedback.className = 'feedback-correct';
    feedback.style.display = 'block';
    gameState.score += station.challengeType === 'dictee' ? 10 : 20;
    gameState.stationsCompleted.add(station.id);
    document.getElementById('scoreValue').textContent = gameState.score;
    setTimeout(closeChallenge, 2500);
  } else {
    // Play failure sound
    const failureSounds = [
      'assets/sounds/ANSWERS_NOK/nok_1.mp3',
      'assets/sounds/ANSWERS_NOK/nok_2.mp3',
      'assets/sounds/ANSWERS_NOK/nok_3.mp3',
      'assets/sounds/ANSWERS_NOK/nok_4.mp3',
      'assets/sounds/ANSWERS_NOK/nok_5.mp3'
    ];
    const randomFailure = failureSounds[Math.floor(Math.random() * failureSounds.length)];
    new Howl({ src: [randomFailure], volume: 0.8 }).play();
    
    feedback.className = 'feedback-incorrect';
    feedback.style.display = 'block';
  }
}

function closeChallenge() {
  document.getElementById('challengeOverlay').style.display = 'none';
  player.interacting = false;
  gameState.currentChallenge = null;
}

// ═══════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════
function update(dt) {
  if (player.interacting) return;
  
  let vx = 0, vy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) vx -= SPEED;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) vx += SPEED;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) vy -= SPEED;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) vy += SPEED;

  if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }

  player.moving = (vx !== 0 || vy !== 0);

  if (player.moving) {
    if      (vx < 0) player.facing = 'left';
    else if (vx > 0) player.facing = 'right';
    else if (vy < 0) player.facing = 'up';
    else             player.facing = 'down';

    const nx = player.x + vx;
    const ny = player.y + vy;
    if (canMoveTo(nx, player.y)) player.x = nx;
    if (canMoveTo(player.x, ny)) player.y = ny;

    player.frameTimer += dt;
    if (player.frameTimer > 140) { 
      player.frameTimer = 0; 
      player.frame = (player.frame + 1) % 4; 
    }
  } else {
    player.frame = 0;
    player.frameTimer = 0;
  }

  snapCamera();
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const GRASS_VARIANTS = ['#5d9e3f','#5ea040','#60a242','#5b9c3d'];
const FLOWER_COLORS  = ['#e84040','#e8c040','#5080e8','#e860e8'];

function drawSheet(key, dx, dy, dw, dh) {
  if (!sheet.complete || sheet.naturalWidth === 0) return false;
  const [sx, sy, sw, sh] = CROP[key];
  ctx.drawImage(sheet, sx, sy, sw, sh, dx, dy, dw ?? sw, dh ?? sh);
  return true;
}

function drawTile(tid, sx, sy, tx, ty, time) {
  switch (tid) {
    case T.GRASS: {
      const v = ((tx * 7 + ty * 13) & 3);
      ctx.fillStyle = GRASS_VARIANTS[v];
      ctx.fillRect(sx, sy, TS, TS);
      if (sheet.complete && sheet.naturalWidth > 0) {
        const [gx, gy] = CROP.grass_plain;
        ctx.drawImage(sheet, gx, gy, TS, TS, sx, sy, TS, TS);
      }
      break;
    }
    case T.PATH: {
      ctx.fillStyle = '#c4a56d';
      ctx.fillRect(sx, sy, TS, TS);
      if (sheet.complete && sheet.naturalWidth > 0) {
        const [px, py] = CROP.path_plain;
        ctx.drawImage(sheet, px, py, TS, TS, sx, sy, TS, TS);
      }
      break;
    }
    case T.WATER: {
      if (waterWavesGif.complete && waterWavesGif.naturalWidth > 0) {
        ctx.drawImage(waterWavesGif, sx, sy, TS, TS);
      } else {
        const wave = Math.sin(time * 0.001 + tx * 0.4 + ty * 0.3) * 12;
        const r = Math.round(42  + wave * 0.3);
        const g = Math.round(120 + wave * 0.4);
        const b = Math.round(180 + wave * 0.5);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(sx, sy, TS, TS);
      }
      break;
    }
    case T.TREE: {
      ctx.fillStyle = '#1a5c1a';
      ctx.fillRect(sx, sy, TS, TS);
      ctx.fillStyle = '#2a8a2a';
      ctx.beginPath();
      ctx.arc(sx + 16, sy + 14, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5a3820';
      ctx.fillRect(sx + 12, sy + 22, 8, 10);
      break;
    }
    case T.ROCK: {
      ctx.fillStyle = '#5d9e3f';
      ctx.fillRect(sx, sy, TS, TS);
      ctx.fillStyle = '#7a7a7a';
      ctx.beginPath();
      ctx.ellipse(sx + 16, sy + 20, 11, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    default:
      ctx.fillStyle = '#5d9e3f';
      ctx.fillRect(sx, sy, TS, TS);
  }
}

function drawObject(obj, time) {
  const sx = Math.round(obj.tx * TS - cam.x);
  const sy = Math.round(obj.ty * TS - cam.y);
  const pw = obj.tw * TS;
  const ph = obj.th * TS;

  if (sx + pw < -8 || sy + ph < -8 || sx > VW + 8 || sy > VH + 8) return;

  if (obj.type === 'campfire') {
    if (campfireGif.complete && campfireGif.naturalWidth > 0) {
      ctx.drawImage(campfireGif, sx, sy, TS, TS);
    } else {
      const flicker = 0.6 + Math.sin(time * 0.015) * 0.4;
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.ellipse(sx + 16, sy + 26, 9, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(255, 100, 0, ${flicker})`;
      ctx.beginPath();
      ctx.ellipse(sx + 16, sy + 18, 7, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    return;
  }

  if (obj.type === 'tree_big') {
    const treeKeys = ['tree_a','tree_b','tree_c'];
    const key = treeKeys[((obj.tx + obj.ty) % 3)];
    if (!drawSheet(key, sx, sy, pw, ph)) {
      ctx.fillStyle = '#5a3820';
      ctx.fillRect(sx + pw/2 - 6, sy + ph - 22, 12, 22);
      const cx = sx + pw / 2;
      const cy = sy + ph * 0.45;
      ctx.fillStyle = '#1a5c1a';
      ctx.beginPath(); ctx.arc(cx, cy + 8, pw * 0.45, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2a8c2a';
      ctx.beginPath(); ctx.arc(cx, cy, pw * 0.42, 0, Math.PI*2); ctx.fill();
    }
    return;
  }

  const sp = OBJ_SPRITE[obj.type];
  if (!sp) return;

  if (!drawSheet(sp.key, sx, sy, pw, ph)) {
    const roof = sp.roofColor;
    const wall = sp.wallColor;
    const rh   = Math.round(ph * 0.42);
    ctx.fillStyle = wall;
    ctx.fillRect(sx, sy + rh, pw, ph - rh);
    ctx.fillStyle = roof;
    ctx.beginPath();
    ctx.moveTo(sx - 4, sy + rh + 4);
    ctx.lineTo(sx + pw / 2, sy);
    ctx.lineTo(sx + pw + 4, sy + rh + 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#6a3a1a';
    ctx.fillRect(sx + pw/2 - 8, sy + ph - 36, 16, 36);
  }
}

function drawNPC(station) {
  const sx = Math.round(station.x - cam.x);
  const sy = Math.round(station.y - cam.y);
  if (sx + 32 < -4 || sy + 32 < -4 || sx > VW + 4 || sy > VH + 4) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx + 16, sy + 28, 10, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Pixel sprite if available, else emoji fallback
  const spriteImg = station.animal.sprite ? ANIMAL_SPRITES[station.animal.sprite] : null;
  if (spriteImg && spriteImg.complete && spriteImg.naturalWidth > 0) {
    const FRAME_W = 32;
    const frame = Math.floor(Date.now() / 280) % 4; // 4-frame idle cycle
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spriteImg, frame * FRAME_W, 0, FRAME_W, 32, sx, sy, 32, 32);
    ctx.imageSmoothingEnabled = false;
  } else {
    ctx.font = '26px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(station.animal.emoji, sx + 16, sy + 14);
  }

  // Completion ring or exclamation mark
  if (gameState.stationsCompleted.has(station.id)) {
    ctx.strokeStyle = '#7ec850';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(sx + 16, sy + 14, 17, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#7ec850';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('✓', sx + 16, sy - 10);
    ctx.fillText('✓', sx + 16, sy - 10);
  } else {
    ctx.font = 'bold 20px Arial';
    ctx.fillStyle = '#ffdd00';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('!', sx + 16, sy - 10);
    ctx.fillText('!', sx + 16, sy - 10);
  }

  // Proximity interaction hint
  const pcx = player.x + player.w / 2;
  const pcy = player.y + player.h / 2;
  const dist = Math.hypot(pcx - (station.x + 16), pcy - (station.y + 16));
  if (dist < TS * 1.8 && !player.interacting && !gameState.stationsCompleted.has(station.id)) {
    const label = 'ESPACE';
    ctx.font = 'bold 10px monospace';
    const lw = ctx.measureText(label).width + 12;
    const bx = sx + 16 - lw / 2;
    const by = sy - 30;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.beginPath();
    ctx.roundRect(bx, by, lw, 16, 4);
    ctx.fill();
    ctx.strokeStyle = '#ffc840';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#ffe080';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, sx + 16, by + 8);
  }
}

function drawPlayer(time) {
  const sx = Math.round(player.x - cam.x);
  const sy = Math.round(player.y - cam.y);
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(sx + player.w/2, sy + player.h - 1, 8, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Draw from sprite sheet if loaded
  if (playerSprite.complete && playerSprite.naturalWidth > 0) {
    const frame = player.moving ? player.frame : 0;
    const srcX = frame * PLAYER_SPRITE.frameW;
    const srcY = PLAYER_SPRITE.row[player.facing] * PLAYER_SPRITE.frameH;
    const drawX = sx + player.w / 2 - PLAYER_SPRITE.drawW / 2;
    const drawY = sy + player.h - PLAYER_SPRITE.drawH;
    ctx.drawImage(
      playerSprite,
      srcX,
      srcY,
      PLAYER_SPRITE.frameW,
      PLAYER_SPRITE.frameH,
      drawX,
      drawY,
      PLAYER_SPRITE.drawW,
      PLAYER_SPRITE.drawH
    );
  } else {
    // Fallback: simple colored rectangle character
    const bob = player.moving ? Math.sin(time * 0.018) * 1.5 : 0;
    ctx.fillStyle = '#2a3a8a';
    ctx.fillRect(sx + 3, sy + player.h - 14 + bob, 7, 9);
    ctx.fillRect(sx + player.w - 10, sy + player.h - 14 + bob, 7, 9);
    ctx.fillStyle = '#c83020';
    ctx.fillRect(sx + 2, sy + 10 + bob, player.w - 4, player.h - 22);
    ctx.fillStyle = '#f5c890';
    ctx.fillRect(sx + 4, sy + bob - 2, player.w - 8, 12);
    ctx.fillStyle = '#6a3010';
    ctx.fillRect(sx + 4, sy + bob - 2, player.w - 8, 4);
  }
}

function render(time) {
  ctx.clearRect(0, 0, VW, VH);

  const tx0 = Math.max(0, Math.floor(cam.x / TS));
  const ty0 = Math.max(0, Math.floor(cam.y / TS));
  const tx1 = Math.min(MAP_W, Math.ceil((cam.x + VW) / TS));
  const ty1 = Math.min(MAP_H, Math.ceil((cam.y + VH) / TS));

  for (let ty = ty0; ty < ty1; ty++) {
    for (let tx = tx0; tx < tx1; tx++) {
      const sx = tx * TS - cam.x;
      const sy = ty * TS - cam.y;
      drawTile(map[ty][tx], sx, sy, tx, ty, time);
    }
  }

  const drawables = OBJECTS.map(o => ({
    obj: o,
    sortY: (o.ty + o.th) * TS,
    type: 'object'
  }));

  STATIONS.forEach(s => {
    drawables.push({
      obj: s,
      sortY: s.y + TS,
      type: 'npc'
    });
  });

  drawables.push({ obj: null, sortY: player.y + player.h, type: 'player' });

  drawables.sort((a, b) => a.sortY - b.sortY);

  for (const item of drawables) {
    if (item.type === 'player') {
      drawPlayer(time);
    } else if (item.type === 'npc') {
      drawNPC(item.obj);
    } else {
      drawObject(item.obj, time);
    }
  }

  const vig = ctx.createRadialGradient(VW/2, VH/2, VH * 0.25, VW/2, VH/2, VH * 0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.38)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, VW, VH);
}

// ═══════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════
let lastTime = 0;
function loop(time) {
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;
  update(dt);
  render(time);
  requestAnimationFrame(loop);
}

// Load data then start game
loadDicteeData().then(() => {
  console.log('🎮 Game starting...');
  requestAnimationFrame(loop);
});
</script>
